services:

  db:
    image: postgres:16
    container_name: crm_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: crm_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - "./app:/app"
    ports:
      - "8080:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
